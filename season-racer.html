<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Season Racer</title>
<style>
  :root {
    --ink: #0d1017;
    --panel: #171b26;
    --panel-line: #2a3040;
    --paper: #f2efe6;
    --amber: #ffb020;
    --red: #ff4d4d;
    --green: #35d07f;
    --muted: #9aa0af;
    --muted2: #7a8090;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }
  #app {
    width: 100%; min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
  }
  #stage {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 400 / 700;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--panel-line);
    background: var(--panel);
  }
  #stageInner { position: absolute; inset: 0; }

  /* ---------- setup screen ---------- */
  .setup { position:absolute; inset:0; overflow-y:auto; padding: 24px 20px; display:flex; flex-direction:column; gap:20px; color: var(--paper); }
  .eyebrow { font-size:11px; letter-spacing:.3em; color: var(--amber); }
  .h1 { font-size: 30px; font-weight: 900; text-transform: uppercase; letter-spacing:-0.02em; line-height:1; margin: 4px 0 0; }
  .preview-card { border-radius:12px; display:flex; align-items:center; justify-content:center; padding:16px 0; background:#10131c; border:1px solid var(--panel-line); }
  .preview-sub { text-align:center; margin-top:-10px; font-size:13px; letter-spacing:.02em; color: var(--muted); }
  .preview-sub b { color: var(--amber); font-weight:700; }

  .field-label { font-size:11px; text-transform:uppercase; letter-spacing:.2em; margin-bottom:8px; color: var(--muted); }
  .selector { display:flex; align-items:center; justify-content:space-between; border-radius:12px; padding:8px; background:#10131c; border:1px solid var(--panel-line); }
  .sel-btn { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:#1e2433; border:none; color: var(--paper); font-size:16px; cursor:pointer; }
  .sel-mid { text-align:center; flex:1; }
  .sel-val { font-weight:700; font-size:14px; color: var(--paper); }
  .sel-sub { font-size:10px; margin-top:2px; color: var(--muted2); }

  .swatch-row { display:flex; gap:8px; flex-wrap:wrap; }
  .swatch { width:36px; height:36px; border-radius:8px; border:1px solid var(--panel-line); cursor:pointer; outline-offset:2px; }
  .swatch.active { outline: 2px solid var(--amber); border:none; }

  .season-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .season-card { border-radius:12px; padding:12px; text-align:left; cursor:pointer; background:#10131c; border:1px solid var(--panel-line); color: var(--paper); }
  .season-card.active { background:#232a3b; border-color: var(--amber); }
  .season-icon { font-size:18px; line-height:1; }
  .season-name { font-size:14px; font-weight:700; margin-top:6px; }
  .season-desc { font-size:10px; margin-top:2px; color: var(--muted2); }

  .start-btn { margin-top:4px; width:100%; padding:14px; border-radius:12px; font-weight:900; text-transform:uppercase; letter-spacing:.15em; font-size:14px; background: var(--amber); color:#1a1200; border:none; cursor:pointer; }

  /* ---------- countdown ---------- */
  .countdown { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
  .cd-dots { display:flex; gap:12px; }
  .cd-dot { width:24px; height:24px; border-radius:50%; background:#333; }
  .cd-dot.lit { background: var(--red); box-shadow: 0 0 16px var(--red); }
  .cd-number { font-size:70px; font-weight:900; color:#1a1a1a; }

  /* ---------- playing ---------- */
  .play-wrap { position:absolute; inset:0; display:flex; flex-direction:column; }
  canvas { width:100%; flex:1; display:block; touch-action:none; }

  .hud { position:absolute; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; pointer-events:none; }
  .hud-chip { padding:4px 8px; border-radius:6px; font-size:12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: rgba(10,12,18,0.55); color: var(--paper); }
  .hud-chip .amber { color: var(--amber); }
  .hud-chip .green { color: var(--green); }

  .controls { position:absolute; bottom:8px; left:8px; right:8px; display:flex; align-items:flex-end; justify-content:space-between; user-select:none; }
  .dpad { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .ctrl-btn {
    width:44px; height:44px; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: rgba(30,36,51,0.85); color: var(--paper); border:1px solid var(--panel-line);
    font-size:18px; cursor:pointer;
  }
  .ctrl-btn.active { transform: scale(0.95); }
  .ctrl-btn.horn { width:56px; height:56px; margin-bottom:16px; background: rgba(255,176,32,0.8); color:#1a1200; border-color: var(--amber); font-size:22px; }
  .ctrl-wide { display:flex; flex-direction:column; gap:6px; }
  .ctrl-btn.wide { flex-direction:row; gap:6px; width:auto; height:auto; padding:8px 12px; font-size:12px; font-weight:700; }
  .ctrl-btn.brake { background: rgba(255,77,77,0.8); color:#1a1200; border-color: var(--red); }
  .ctrl-btn.gas { background: rgba(53,208,127,0.8); color:#1a1200; border-color: var(--green); }

  .gameover-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:0 24px; background: rgba(10,12,18,0.82); }
  .go-title { font-size:38px; font-weight:900; color: var(--red); }
  .go-dist { font-size:14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--paper); }
  .go-dist .amber { color: var(--amber); }
  .go-btn { width:100%; max-width:220px; padding:10px; border-radius:12px; font-weight:900; text-transform:uppercase; letter-spacing:.15em; font-size:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .go-btn.primary { background: var(--amber); color:#1a1200; }
  .go-btn.secondary { background:transparent; color: var(--paper); border:1px solid var(--panel-line); }
</style>
</head>
<body>
<div id="app"><div id="stage"><div id="stageInner"></div></div></div>

<script>
/* ============================================================
   TOKENS & DATA
   ============================================================ */
const AMBER = "#ffb020";
const RED = "#ff4d4d";
const GREEN = "#35d07f";

const LANES = 4;
const BASE_W = 400;
const BASE_H = 700;

const BRANDS = ["Falcon", "Viper", "Thunder", "Bolt"];
const TYPES = [
  { name: "Sports", top: 1.28, accel: 1.22, handling: 1.18 },
  { name: "SUV", top: 1.0, accel: 0.95, handling: 0.9 },
  { name: "Truck", top: 0.85, accel: 0.8, handling: 0.72 },
  { name: "Compact", top: 1.08, accel: 1.08, handling: 1.08 },
];
const SWATCHES = ["#e6483c", "#3b6fe0", "#1a1c22", "#f4f2ea", "#f2c230", "#2e9e5b"];

const SEASONS = [
  { key: "desert", label: "Desert", icon: "☀️", bg: "#e8c580", road: "#c8a86e", deco: "#b3865a", weather: "#d2b478", desc: "Sand dunes & dust" },
  { key: "winter", label: "Winter", icon: "❄️", bg: "#dcebf5", road: "#cdd2d7", deco: "#ffffff", weather: "#ffffff", desc: "Snow & slick ice" },
  { key: "spring", label: "Spring", icon: "🌸", bg: "#bee1aa", road: "#5a5a5f", deco: "#3c8c3c", weather: "#ffd2e6", desc: "Fields & petals" },
  { key: "autumn", label: "Autumn", icon: "🍂", bg: "#e1b482", road: "#6e5a46", deco: "#a05a28", weather: "#c87828", desc: "Falling leaves" },
];

/* ============================================================
   STATE
   ============================================================ */
const state = { screen: "setup", brand: 0, type: 0, color: 0, seasonIdx: 0, countdown: 3, finalDistance: 0 };

let rafId = null;
let countdownTimer = null;
let game = null; // populated by startGame()
const input = { left: false, right: false, up: false, down: false, accel: false, brake: false, horn: false };

/* ============================================================
   HELPERS
   ============================================================ */
function laneCenterX(lane) {
  const roadLeft = BASE_W * 0.14;
  const roadRight = BASE_W * 0.86;
  const laneW = (roadRight - roadLeft) / LANES;
  return roadLeft + laneW * (lane + 0.5);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawCar(ctx, cx, cy, w, h, color, flipped) {
  ctx.save();
  ctx.translate(cx, cy);
  if (flipped) ctx.rotate(Math.PI);
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  roundRect(ctx, -w / 2 - 1, -h / 2 + 4, w + 2, h, 8);
  ctx.fill();
  ctx.fillStyle = color;
  roundRect(ctx, -w / 2, -h / 2, w, h, 8);
  ctx.fill();
  ctx.fillStyle = "rgba(120,190,235,0.9)";
  roundRect(ctx, -w * 0.31, -h * 0.36, w * 0.62, h * 0.26, 4);
  ctx.fill();
  ctx.fillStyle = "rgba(120,190,235,0.65)";
  roundRect(ctx, -w * 0.31, h * 0.1, w * 0.62, h * 0.18, 4);
  ctx.fill();
  ctx.fillStyle = "#ffe27a";
  ctx.fillRect(-w / 2 + 2, -h / 2 + 2, w * 0.16, h * 0.06);
  ctx.fillRect(w / 2 - 2 - w * 0.16, -h / 2 + 2, w * 0.16, h * 0.06);
  ctx.fillStyle = "#ff5555";
  ctx.fillRect(-w / 2 + 2, h / 2 - 2 - h * 0.06, w * 0.16, h * 0.06);
  ctx.fillRect(w / 2 - 2 - w * 0.16, h / 2 - 2 - h * 0.06, w * 0.16, h * 0.06);
  ctx.restore();
}

function el(tag, props, children) {
  props = props || {};
  children = children || [];
  const node = document.createElement(tag);
  for (const k in props) {
    const v = props[k];
    if (v == null) continue;
    if (k === "class") node.className = v;
    else if (k === "style") Object.assign(node.style, v);
    else if (k.indexOf("on") === 0 && typeof v === "function") node.addEventListener(k.slice(2), v);
    else if (k === "html") node.innerHTML = v;
    else node.setAttribute(k, v);
  }
  const list = Array.isArray(children) ? children : [children];
  for (const c of list) {
    if (c == null) continue;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}

function stopLoops() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

/* ============================================================
   SCREEN: SETUP
   ============================================================ */
function renderSetup() {
  const root = el("div", { class: "setup" });

  root.appendChild(el("div", {}, [
    el("div", { class: "eyebrow" }, "ARCADE · 01"),
    el("div", { class: "h1", html: "Season<br/>Racer" }),
  ]));

  const carType = TYPES[state.type];
  const previewSvgWrap = el("div", { class: "preview-card" });
  previewSvgWrap.innerHTML =
    '<svg width="90" height="150" viewBox="0 0 90 150">' +
    '<rect x="4" y="6" width="82" height="140" rx="10" fill="' + SWATCHES[state.color] + '" />' +
    '<rect x="18" y="18" width="54" height="34" rx="5" fill="rgba(120,190,235,0.9)" />' +
    '<rect x="18" y="96" width="54" height="26" rx="5" fill="rgba(120,190,235,0.65)" />' +
    '<rect x="8" y="10" width="14" height="8" fill="#ffe27a" />' +
    '<rect x="68" y="10" width="14" height="8" fill="#ffe27a" />' +
    '<rect x="8" y="132" width="14" height="8" fill="#ff5555" />' +
    '<rect x="68" y="132" width="14" height="8" fill="#ff5555" />' +
    '</svg>';
  root.appendChild(previewSvgWrap);

  root.appendChild(el("div", { class: "preview-sub" }, [
    BRANDS[state.brand] + " ",
    el("b", {}, TYPES[state.type].name),
  ]));

  root.appendChild(selectorRow("Brand", BRANDS[state.brand], null,
    () => { state.brand = (state.brand + BRANDS.length - 1) % BRANDS.length; render(); },
    () => { state.brand = (state.brand + 1) % BRANDS.length; render(); }));

  root.appendChild(selectorRow("Type", TYPES[state.type].name,
    "Top " + Math.round(carType.top * 100) + "% · Accel " + Math.round(carType.accel * 100) + "% · Handling " + Math.round(carType.handling * 100) + "%",
    () => { state.type = (state.type + TYPES.length - 1) % TYPES.length; render(); },
    () => { state.type = (state.type + 1) % TYPES.length; render(); }));

  const colorBlock = el("div", {}, [el("div", { class: "field-label" }, "Color")]);
  const swRow = el("div", { class: "swatch-row" });
  SWATCHES.forEach((c, i) => {
    swRow.appendChild(el("button", {
      class: "swatch" + (i === state.color ? " active" : ""),
      style: { background: c },
      "aria-label": "color " + i,
      onclick: () => { state.color = i; render(); },
    }));
  });
  colorBlock.appendChild(swRow);
  root.appendChild(colorBlock);

  const seasonBlock = el("div", {}, [el("div", { class: "field-label" }, "Season")]);
  const grid = el("div", { class: "season-grid" });
  SEASONS.forEach((s, i) => {
    const active = i === state.seasonIdx;
    grid.appendChild(el("button", {
      class: "season-card" + (active ? " active" : ""),
      onclick: () => { state.seasonIdx = i; render(); },
    }, [
      el("div", { class: "season-icon" }, s.icon),
      el("div", { class: "season-name" }, s.label),
      el("div", { class: "season-desc" }, s.desc),
    ]));
  });
  seasonBlock.appendChild(grid);
  root.appendChild(seasonBlock);

  root.appendChild(el("button", {
    class: "start-btn",
    onclick: () => setScreen("countdown"),
  }, "Start Engine →"));

  return root;
}

function selectorRow(label, value, sub, onPrev, onNext) {
  return el("div", {}, [
    el("div", { class: "field-label" }, label),
    el("div", { class: "selector" }, [
      el("button", { class: "sel-btn", onclick: onPrev }, "‹"),
      el("div", { class: "sel-mid" }, [
        el("div", { class: "sel-val" }, value),
        sub ? el("div", { class: "sel-sub" }, sub) : null,
      ]),
      el("button", { class: "sel-btn", onclick: onNext }, "›"),
    ]),
  ]);
}

/* ============================================================
   SCREEN: COUNTDOWN
   ============================================================ */
function renderCountdown() {
  const root = el("div", { class: "countdown", style: { background: SEASONS[state.seasonIdx].bg } });
  const dots = el("div", { class: "cd-dots" });
  for (let i = 0; i < 3; i++) {
    const lit = state.countdown > 2 - i;
    dots.appendChild(el("div", { class: "cd-dot" + (lit ? " lit" : "") }));
  }
  root.appendChild(dots);
  root.appendChild(el("div", { class: "cd-number" }, state.countdown > 0 ? String(state.countdown) : "GO"));
  return root;
}

function startCountdown() {
  state.countdown = 3;
  let n = 3;
  countdownTimer = setInterval(() => {
    n -= 1;
    state.countdown = n;
    renderCountdownOnly();
    if (n <= 0) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      startGame();
      setScreen("playing");
    }
  }, 650);
}

function renderCountdownOnly() {
  const stageInner = document.getElementById("stageInner");
  stageInner.innerHTML = "";
  stageInner.appendChild(renderCountdown());
}

/* ============================================================
   GAME LOGIC
   ============================================================ */
function startGame() {
  const particles = Array.from({ length: 60 }, () => ({
    x: Math.random() * BASE_W,
    y: Math.random() * BASE_H,
    speed: 40 + Math.random() * 60,
    size: 2 + Math.random() * 3,
  }));
  game = {
    lane: Math.floor(LANES / 2),
    laneX: laneCenterX(Math.floor(LANES / 2)),
    y: BASE_H * 0.76,
    speed: 90,
    distance: 0,
    hornTimer: 0,
    obstacles: [],
    particles,
    spawnTimer: 0,
    laneRepeat: 0,
    roadOffset: 0,
    over: false,
  };
}

function spawnObstacle(g) {
  const lane = Math.floor(Math.random() * LANES);
  g.obstacles.push({
    lane,
    x: laneCenterX(lane),
    y: -60,
    w: 32,
    h: 54,
    color: SWATCHES[Math.floor(Math.random() * SWATCHES.length)],
  });
}

function gameTick(ctx, hudDist, hudSpeed) {
  let last = performance.now();
  let hudAccum = 0;
  const carType = TYPES[state.type];
  const season = SEASONS[state.seasonIdx];

  function tick(now) {
    let dt = (now - last) / 1000;
    if (dt > 0.05) dt = 0.05;
    last = now;
    const g = game;

    if (g && !g.over) {
      const maxSpeed = 240 * carType.top;
      const minSpeed = 40;

      if (input.accel) g.speed += 130 * carType.accel * dt;
      if (input.brake) g.speed -= 250 * dt;
      if (!input.accel && !input.brake) g.speed -= 38 * dt;
      g.speed = Math.max(minSpeed, Math.min(maxSpeed, g.speed));

      g.laneRepeat -= dt;
      if ((input.left || input.right) && g.laneRepeat <= 0) {
        if (input.left && g.lane > 0) g.lane -= 1;
        if (input.right && g.lane < LANES - 1) g.lane += 1;
        g.laneRepeat = 0.2;
      }
      const target = laneCenterX(g.lane);
      g.laneX += (target - g.laneX) * Math.min(1, (6 + carType.handling * 6) * dt);

      const minY = BASE_H * 0.55, maxY = BASE_H * 0.86;
      if (input.up) g.y -= 150 * carType.handling * dt;
      if (input.down) g.y += 150 * carType.handling * dt;
      g.y = Math.max(minY, Math.min(maxY, g.y));

      if (input.horn) g.hornTimer = 0.35;
      if (g.hornTimer > 0) g.hornTimer -= dt;

      g.distance += g.speed * dt * 0.1;
      g.roadOffset = (g.roadOffset + g.speed * dt) % 40;

      g.spawnTimer -= dt;
      const interval = Math.max(0.42, 1.35 - g.distance * 0.0006);
      if (g.spawnTimer <= 0) {
        spawnObstacle(g);
        g.spawnTimer = interval;
      }

      for (const o of g.obstacles) o.y += g.speed * dt;
      g.obstacles = g.obstacles.filter((o) => o.y < BASE_H + 80);

      const pw = 42, ph = 74;
      const pr = { x: g.laneX - pw / 2, y: g.y - ph / 2, w: pw, h: ph };
      for (const o of g.obstacles) {
        const orct = { x: o.x - o.w / 2, y: o.y - o.h / 2, w: o.w, h: o.h };
        const hit = pr.x < orct.x + orct.w && pr.x + pr.w > orct.x && pr.y < orct.y + orct.h && pr.y + pr.h > orct.y;
        if (hit) {
          if (g.hornTimer > 0) {
            o.y = BASE_H + 999;
          } else {
            g.over = true;
            state.finalDistance = Math.round(g.distance);
            setScreen("gameover");
            return;
          }
        }
      }

      for (const p of g.particles) {
        p.y += p.speed * dt;
        if (season.key === "winter") p.x += Math.sin(p.y * 0.02) * 10 * dt;
        if (p.y > BASE_H) {
          p.y = -5;
          p.x = Math.random() * BASE_W;
        }
      }

      hudAccum += dt;
      if (hudAccum > 0.1) {
        hudAccum = 0;
        hudDist.innerHTML = "DIST <span class='amber'>" + Math.round(g.distance) + "m</span>";
        hudSpeed.innerHTML = "SPD <span class='green'>" + Math.round(g.speed) + "</span>";
      }
    }

    draw(ctx, g, season);
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function draw(ctx, g, season) {
  ctx.clearRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = season.bg;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  const roadX = BASE_W * 0.14, roadW = BASE_W * 0.72;
  ctx.fillStyle = season.road;
  ctx.fillRect(roadX, 0, roadW, BASE_H);

  ctx.fillStyle = "rgba(255,255,255,0.65)";
  for (let lane = 1; lane < LANES; lane++) {
    const lx = roadX + (roadW / LANES) * lane;
    for (let y = -40 + (g ? g.roadOffset : 0); y < BASE_H; y += 40) {
      ctx.fillRect(lx - 2, y, 4, 22);
    }
  }
  ctx.fillStyle = "#f0f0f0";
  ctx.fillRect(roadX - 5, 0, 5, BASE_H);
  ctx.fillRect(roadX + roadW, 0, 5, BASE_H);

  ctx.fillStyle = season.deco;
  for (let i = 0; i < 6; i++) {
    const dy = ((i * 130 + (g ? g.roadOffset : 0) * 1.3) % (BASE_H + 130)) - 65;
    ctx.beginPath();
    ctx.arc(16, dy, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(BASE_W - 16, dy, 9, 0, Math.PI * 2);
    ctx.fill();
  }

  if (g) {
    ctx.fillStyle = season.weather;
    ctx.globalAlpha = season.key === "desert" ? 0.45 : 0.85;
    for (const p of g.particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const o of g.obstacles) drawCar(ctx, o.x, o.y, o.w, o.h, o.color, true);

    drawCar(ctx, g.laneX, g.y, 42, 74, SWATCHES[state.color], false);

    if (g.hornTimer > 0) {
      ctx.fillStyle = RED;
      ctx.font = "bold 14px system-ui";
      ctx.fillText("HONK!", g.laneX + 24, g.y - 40);
    }
  }
}

/* ============================================================
   SCREEN: PLAYING / GAME OVER
   ============================================================ */
function ctrlBtn(label, key, extraClass) {
  const cls = ["ctrl-btn"];
  if (extraClass) cls.push(extraClass);
  const btn = el("button", { class: cls.join(" "), html: label });
  const setActive = (v) => { input[key] = v; btn.classList.toggle("active", v); };
  const down = (e) => { e.preventDefault(); setActive(true); };
  const up = (e) => { e.preventDefault(); setActive(false); };
  btn.addEventListener("pointerdown", down);
  btn.addEventListener("pointerup", up);
  btn.addEventListener("pointerleave", up);
  btn.addEventListener("pointercancel", up);
  return btn;
}

function renderPlaying(isGameOver) {
  const wrap = el("div", { class: "play-wrap" });
  const canvas = el("canvas", { width: BASE_W, height: BASE_H });
  wrap.appendChild(canvas);

  const hud = el("div", { class: "hud" });
  const hudDist = el("div", { class: "hud-chip", html: "DIST <span class='amber'>0m</span>" });
  const hudSpeed = el("div", { class: "hud-chip", html: "SPD <span class='green'>0</span>" });
  hud.appendChild(hudDist);
  hud.appendChild(hudSpeed);
  wrap.appendChild(hud);

  if (!isGameOver) {
    const controls = el("div", { class: "controls" });

    const dpad = el("div", { class: "dpad" });
    dpad.appendChild(ctrlBtn("◀", "left"));
    dpad.appendChild(ctrlBtn("▶", "right"));
    dpad.appendChild(ctrlBtn("▲", "up"));
    dpad.appendChild(ctrlBtn("▼", "down"));
    controls.appendChild(dpad);

    controls.appendChild(ctrlBtn("🔊", "horn", "horn"));

    const rightCol = el("div", { class: "ctrl-wide" });
    rightCol.appendChild(ctrlBtn("⛔ BRAKE", "brake", "wide brake"));
    rightCol.appendChild(ctrlBtn("⛽ GAS", "accel", "wide gas"));
    controls.appendChild(rightCol);

    wrap.appendChild(controls);
  }

  if (isGameOver) {
    const overlay = el("div", { class: "gameover-overlay" }, [
      el("div", { class: "go-title" }, "CRASH!"),
      el("div", { class: "go-dist", html: "Distance: <span class='amber'>" + state.finalDistance + "m</span>" }),
      el("button", { class: "go-btn primary", onclick: () => setScreen("countdown") }, "↻ Retry"),
      el("button", { class: "go-btn secondary", onclick: () => setScreen("setup") }, "🚗 Change Car / Season"),
    ]);
    wrap.appendChild(overlay);
  }

  requestAnimationFrame(() => {
    const ctx = canvas.getContext("2d");
    gameTick(ctx, hudDist, hudSpeed);
  });

  return wrap;
}

/* ============================================================
   ROUTER
   ============================================================ */
function setScreen(screen) {
  stopLoops();
  state.screen = screen;
  render();
  if (screen === "countdown") startCountdown();
}

function render() {
  const stageInner = document.getElementById("stageInner");
  stageInner.innerHTML = "";
  let node;
  if (state.screen === "setup") node = renderSetup();
  else if (state.screen === "countdown") node = renderCountdown();
  else if (state.screen === "playing") node = renderPlaying(false);
  else if (state.screen === "gameover") node = renderPlaying(true);
  stageInner.appendChild(node);
}

/* ============================================================
   KEYBOARD
   ============================================================ */
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "w") input.accel = true;
  if (k === "s") input.brake = true;
  if (k === "a" || k === "arrowleft") input.left = true;
  if (k === "d" || k === "arrowright") input.right = true;
  if (k === "arrowup") input.up = true;
  if (k === "arrowdown") input.down = true;
  if (k === "h" || k === " ") input.horn = true;
  if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) e.preventDefault();
});
window.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (k === "w") input.accel = false;
  if (k === "s") input.brake = false;
  if (k === "a" || k === "arrowleft") input.left = false;
  if (k === "d" || k === "arrowright") input.right = false;
  if (k === "arrowup") input.up = false;
  if (k === "arrowdown") input.down = false;
  if (k === "h" || k === " ") input.horn = false;
});

/* ============================================================
   INIT
   ============================================================ */
render();
</script>
</body>
</html>
